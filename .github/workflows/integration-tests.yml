          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
          KAFKA_CFG_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
          KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_CFG_LOG_RETENTION_HOURS: '1'
        options: >-
          --health-cmd "kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: eventum
        run: uv sync --group dev

      - name: Run performance tests
        working-directory: eventum
        env:
          OPENSEARCH_URL: http://localhost:9200
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: '8123'
          KAFKA_BOOTSTRAP: localhost:9094
        run: |
          uv run pytest tests/performance/test_throughput.py \
            -m performance \
            -v -s \
            --no-cov \
            --tb=short \
            -k "${{ matrix.backend }}" \
            --junitxml=reports/performance-${{ matrix.backend }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results-${{ matrix.backend }}
          path: eventum/reports/
          retention-days: 30

